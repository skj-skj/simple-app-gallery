<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-mono); }
.wrap { padding: 1.5rem 0; max-width: 680px; }
h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; padding: 3px 10px; border-radius: var(--border-radius-md); background: var(--color-background-success); color: var(--color-text-success); margin-bottom: 1.5rem; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-success); }
.drop-zone { border: 1.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 2rem; text-align: center; cursor: pointer; transition: background 0.15s; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.drop-zone:hover { background: var(--color-background-secondary); }
.drop-label { font-size: 14px; color: var(--color-text-secondary); }
.drop-hint { font-size: 12px; color: var(--color-text-tertiary); }
textarea { width: 100%; min-height: 80px; font-family: var(--font-mono); font-size: 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; background: var(--color-background-primary); color: var(--color-text-primary); resize: vertical; margin-top: 1rem; }
textarea:focus { outline: none; border-color: var(--color-border-primary); }
button { margin-top: 1rem; padding: 8px 20px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; font-size: 13px; }
button:hover { background: var(--color-background-secondary); }
.results { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 10px; }
.account-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; }
.acc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.acc-icon { width: 32px; height: 32px; border-radius: var(--border-radius-md); background: var(--color-background-info); color: var(--color-text-info); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
.acc-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.acc-issuer { font-size: 12px; color: var(--color-text-secondary); }
.uri-row { display: flex; align-items: center; gap: 8px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 10px; }
.uri-text { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); flex: 1; word-break: break-all; }
.copy-btn { flex-shrink: 0; padding: 4px 10px; font-size: 11px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; }
.copy-btn:hover { background: var(--color-background-primary); }
.totp-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
.totp-code { font-size: 22px; font-weight: 500; letter-spacing: 4px; color: var(--color-text-primary); font-family: var(--font-mono); }
.totp-timer { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
.timer-ring { width: 20px; height: 20px; transform: rotate(-90deg); }
.error { font-size: 13px; color: var(--color-text-danger); padding: 10px 14px; border: 0.5px solid var(--color-border-danger); border-radius: var(--border-radius-md); background: var(--color-background-danger); margin-top: 1rem; }
.divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1.5rem 0; }
</style>

<div class="wrap">
  <h2>otpauth migration decoder</h2>
  <p class="sub">Paste your <code>otpauth-migration://offline?data=...</code> URL below. Everything runs in your browser — no data leaves your device.</p>
  <div class="badge"><span class="dot"></span>100% local — no network requests</div>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileIn').click()">
    <div class="drop-label">Drop a QR code image here</div>
    <div class="drop-hint">or click to select a screenshot — or paste the URL below</div>
    <input type="file" id="fileIn" accept="image/*" style="display:none">
  </div>

  <textarea id="urlInput" placeholder="otpauth-migration://offline?data=CjMKCk..."></textarea>
  <button onclick="decode()">Decode</button>

  <div id="output"></div>
</div>

<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
const fileIn = document.getElementById('fileIn');
const urlInput = document.getElementById('urlInput');
const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.background = 'var(--color-background-secondary)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.background = ''; });
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.style.background = ''; const f = e.dataTransfer.files[0]; if (f) readQR(f); });
fileIn.addEventListener('change', () => { if (fileIn.files[0]) readQR(fileIn.files[0]); });

function readQR(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const result = jsQR(id.data, id.width, id.height);
      if (result) { urlInput.value = result.data; decode(); }
      else showError('No QR code detected in image.');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function showError(msg) {
  document.getElementById('output').innerHTML = `<div class="error">${msg}</div>`;
}

function decode() {
  const raw = urlInput.value.trim();
  if (!raw) { showError('Paste a migration URL first.'); return; }
  try {
    const url = new URL(raw);
    if (url.protocol !== 'otpauth-migration:') throw new Error('Not an otpauth-migration URL');
    const data = url.searchParams.get('data');
    if (!data) throw new Error('Missing data parameter');
    const bytes = base64ToBytes(data);
    const accounts = parseProto(bytes);
    if (!accounts.length) { showError('No accounts found in this migration data.'); return; }
    renderAccounts(accounts);
  } catch(e) {
    showError('Decode error: ' + e.message);
  }
}

function base64ToBytes(b64) {
  const bin = atob(b64.replace(/-/g,'+').replace(/_/g,'/'));
  return new Uint8Array([...bin].map(c => c.charCodeAt(0)));
}

function readVarint(bytes, pos) {
  let result = 0, shift = 0;
  while (pos < bytes.length) {
    const b = bytes[pos++];
    result |= (b & 0x7F) << shift;
    shift += 7;
    if (!(b & 0x80)) break;
  }
  return { value: result >>> 0, pos };
}

function readBytes(bytes, pos) {
  const { value: len, pos: p } = readVarint(bytes, pos);
  return { value: bytes.slice(p, p + len), pos: p + len };
}

function parseProto(bytes) {
  const accounts = [];
  let pos = 0;
  while (pos < bytes.length) {
    const { value: tag, pos: p1 } = readVarint(bytes, pos);
    pos = p1;
    const fieldNum = tag >>> 3;
    const wireType = tag & 0x7;
    if (wireType === 2) {
      const { value: blob, pos: p2 } = readBytes(bytes, pos);
      pos = p2;
      if (fieldNum === 1) {
        accounts.push(parseAccount(blob));
      }
    } else if (wireType === 0) {
      const { pos: p2 } = readVarint(bytes, pos);
      pos = p2;
    } else {
      pos++;
    }
  }
  return accounts.filter(Boolean);
}

function parseAccount(bytes) {
  const acc = { secret: null, name: '', issuer: '', algo: 1, digits: 6, type: 2, counter: 0 };
  let pos = 0;
  const td = new TextDecoder();
  while (pos < bytes.length) {
    const { value: tag, pos: p1 } = readVarint(bytes, pos);
    pos = p1;
    const field = tag >>> 3;
    const wire = tag & 0x7;
    if (wire === 2) {
      const { value: blob, pos: p2 } = readBytes(bytes, pos);
      pos = p2;
      if (field === 1) acc.secret = blob;
      else if (field === 2) acc.name = td.decode(blob);
      else if (field === 3) acc.issuer = td.decode(blob);
    } else if (wire === 0) {
      const { value: v, pos: p2 } = readVarint(bytes, pos);
      pos = p2;
      if (field === 4) acc.algo = v;
      else if (field === 5) acc.digits = v === 2 ? 8 : 6;
      else if (field === 6) acc.type = v;
      else if (field === 7) acc.counter = v;
    } else { pos++; }
  }
  return acc.secret ? acc : null;
}

function base32Decode(str) {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  const s = str.replace(/=+$/, '').toUpperCase();
  let bits = 0, val = 0;
  const out = [];
  for (const c of s) {
    const idx = alphabet.indexOf(c);
    if (idx < 0) continue;
    val = (val << 5) | idx;
    bits += 5;
    if (bits >= 8) { bits -= 8; out.push((val >> bits) & 0xFF); }
  }
  return new Uint8Array(out);
}

function bytesToBase32(bytes) {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  let bits = 0, val = 0, out = '';
  for (const b of bytes) {
    val = (val << 8) | b; bits += 8;
    while (bits >= 5) { bits -= 5; out += alphabet[(val >> bits) & 31]; }
  }
  if (bits > 0) out += alphabet[(val << (5 - bits)) & 31];
  return out;
}

async function hmacSha1(key, data) {
  const k = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', k, data);
  return new Uint8Array(sig);
}

async function computeTOTP(secretBytes, digits = 6) {
  const t = Math.floor(Date.now() / 30000);
  const buf = new ArrayBuffer(8);
  const view = new DataView(buf);
  view.setUint32(0, 0);
  view.setUint32(4, t);
  const hmac = await hmacSha1(secretBytes, buf);
  const offset = hmac[19] & 0xF;
  const code = ((hmac[offset] & 0x7F) << 24 | hmac[offset+1] << 16 | hmac[offset+2] << 8 | hmac[offset+3]) % Math.pow(10, digits);
  return String(code).padStart(digits, '0');
}

function buildTotpUri(acc) {
  const secret = bytesToBase32(acc.secret);
  const label = encodeURIComponent(acc.name || 'Account');
  let uri = `otpauth://totp/${label}?secret=${secret}`;
  if (acc.issuer) uri += `&issuer=${encodeURIComponent(acc.issuer)}`;
  if (acc.digits !== 6) uri += `&digits=${acc.digits}`;
  const algoMap = {1:'SHA1',2:'SHA256',3:'SHA512'};
  if (acc.algo !== 1) uri += `&algorithm=${algoMap[acc.algo]||'SHA1'}`;
  return uri;
}

function initials(name, issuer) {
  const s = issuer || name || '?';
  return s.replace(/\(.*?\)/g,'').trim().slice(0,2).toUpperCase();
}

async function renderAccounts(accounts) {
  const out = document.getElementById('output');
  out.innerHTML = '<div class="results" id="results"></div>';
  const results = document.getElementById('results');

  for (const acc of accounts) {
    const uri = buildTotpUri(acc);
    const card = document.createElement('div');
    card.className = 'account-card';
    const ini = initials(acc.name, acc.issuer);
    card.innerHTML = `
      <div class="acc-header">
        <div class="acc-icon">${ini}</div>
        <div>
          <div class="acc-name">${esc(acc.name || 'Unknown')}</div>
          ${acc.issuer ? `<div class="acc-issuer">${esc(acc.issuer)}</div>` : ''}
        </div>
      </div>
      <div class="uri-row">
        <div class="uri-text">${esc(uri)}</div>
        <button class="copy-btn" onclick="copyText(this,'${esc(uri)}')">copy uri</button>
      </div>
      <div class="totp-row">
        <div class="totp-code" id="code-${ini}-${Math.random().toString(36).slice(2)}">——————</div>
        <div class="totp-timer">
          <svg class="timer-ring" viewBox="0 0 20 20">
            <circle cx="10" cy="10" r="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="2"/>
            <circle cx="10" cy="10" r="8" fill="none" stroke="var(--color-text-secondary)" stroke-width="2"
              stroke-dasharray="50.27" stroke-dashoffset="0" id="ring-${ini}" stroke-linecap="round"/>
          </svg>
          <span id="timer-${ini}">—s</span>
        </div>
      </div>`;
    results.appendChild(card);

    const codeEl = card.querySelector('.totp-code');
    const ringEl = card.querySelector('circle:last-child');
    const timerEl = card.querySelector('[id^="timer-"]');

    async function updateCode() {
      if (acc.type === 1) {
        codeEl.textContent = '(HOTP — counter-based)';
        return;
      }
      const code = await computeTOTP(acc.secret, acc.digits);
      codeEl.textContent = code.slice(0,3) + ' ' + code.slice(3);
    }

    function updateTimer() {
      const now = Date.now();
      const remaining = 30 - Math.floor((now / 1000) % 30);
      timerEl.textContent = remaining + 's';
      const progress = remaining / 30;
      const circ = 50.27;
      ringEl.setAttribute('stroke-dashoffset', circ * (1 - progress));
      const prevRemaining = remaining + 1;
      if (prevRemaining === 31 || remaining === 30) updateCode();
    }

    await updateCode();
    updateTimer();
    setInterval(updateTimer, 1000);
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}
</script>
